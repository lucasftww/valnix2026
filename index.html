    <!-- Auto-detect referrer/click IDs and inject UTMs -->
    <script>
      (function(){
        var params = new URLSearchParams(window.location.search);
        if (params.get('utm_source')) {
          try {
            var existing = {};
            ['utm_source','utm_medium','utm_campaign','utm_content','utm_term'].forEach(function(k){
              var v = params.get(k); if(v) existing[k] = v;
            });
            sessionStorage.setItem('valnix_utm_params', JSON.stringify(existing));
          } catch(e){}
          return;
        }
        // If UTMs already captured in this session, don't overwrite with auto-detection
        try { if (sessionStorage.getItem('valnix_utm_params')) return; } catch(e){}
        var ref = (document.referrer || '').toLowerCase();
        var utm = null;
        // Only auto-detect PAID traffic (click IDs from ad platforms)
        // Organic, direct, and social traffic should NOT be attributed as campaigns
        if (params.get('gclid')) {
          utm = { utm_source: 'google', utm_medium: 'cpc', utm_campaign: params.get('utm_campaign') || 'google_ads' };
        } else if (params.get('fbclid')) {
          utm = { utm_source: 'facebook', utm_medium: 'cpc', utm_campaign: params.get('utm_campaign') || 'facebook_ads' };
        }
        // All other traffic (organic, direct, social referrers) is intentionally NOT tagged
        // so UTMify only tracks actual paid campaign conversions
        if (utm) {
          var url = new URL(window.location.href);
          for (var key in utm) { url.searchParams.set(key, utm[key]); }
          window.history.replaceState(null, '', url.toString());
          try { sessionStorage.setItem('valnix_utm_params', JSON.stringify(utm)); } catch(e){}
        }
      })();
